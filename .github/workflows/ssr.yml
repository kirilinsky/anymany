name: SSR Ready

on:
  push:
    branches: [main]
    paths-ignore:
      - "demo/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "demo/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ssr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm test -- src/ssr.test.ts
