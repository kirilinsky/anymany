name: publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      # Trusted publishing needs npm >= 11.5.1 — Node 24 bundles it already
      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm lint

      - run: pnpm test

      - run: pnpm build

      - name: Smoke test package outputs
        run: |
          node --input-type=module -e "import { anymany } from './dist/index.mjs'; if (typeof anymany !== 'function') throw new Error('ESM export failed')"
          node -e "const { anymany } = require('./dist/index.cjs'); if (typeof anymany !== 'function') throw new Error('CJS export failed')"

      - run: pnpm publint

      # OIDC trusted publishing — no token, no provenance
      - run: npm publish --provenance=false --access public

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          NOTES=""
          if [ -f CHANGELOG.md ]; then
            NOTES="$(awk "/^## ${VERSION}$/{flag=1; next} /^## /{flag=0} flag" CHANGELOG.md)"
          fi

          if [ -n "$NOTES" ]; then
            gh release create "$TAG" --title "$TAG" --notes "$NOTES"
          else
            gh release create "$TAG" --title "$TAG" --generate-notes
          fi
